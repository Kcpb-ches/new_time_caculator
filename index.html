function isoToMinguo(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  const yr = d.getFullYear() - 1911;
  const mo = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  const hr = String(d.getHours()).padStart(2,'0');
  const mn = String(d.getMinutes()).padStart(2,'0');
  return `${yr}年${mo}月${dy}日${hr}時${mn}分`;
}

function isoToMinguoDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  const yr = d.getFullYear() - 1911;
  const mo = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  return `${yr}年${mo}月${dy}日`;
}

function parseMinguoDateTime(yr, mo, dy, hr, mn) {
  if (!yr || !mo || !dy) return "";
  const fullYr = parseInt(yr, 10) + 1911;
  const moStr = String(mo).padStart(2,'0');
  const dyStr = String(dy).padStart(2,'0');
  const hrStr = String(hr||0).padStart(2,'0');
  const mnStr = String(mn||0).padStart(2,'0');
  return `${fullYr}-${moStr}-${dyStr}T${hrStr}:${mnStr}:00`;
}

function calcObstacleMinutes(obstacles) {
  let total = 0;
  OBSTACLE_TYPES.forEach(ot => {
    const obs = obstacles[ot.id];
    if (obs && obs.checked && obs.start && obs.end) {
      const diff = (new Date(obs.end) - new Date(obs.start)) / 60000;
      if (diff > 0) total += diff;
    }
  });
  return total;
}

function calcDeadline(arrestTime, isWanted, obstacleMinutes) {
  if (!arrestTime) return null;
  const limit = isWanted ? 1440 : 960;
  const ms = new Date(arrestTime).getTime() + (limit + obstacleMinutes) * 60000;
  return new Date(ms).toISOString();
}

function minutesToHM(mins) {
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return `${h}小時${m}分`;
}

function newSuspect(idx) {
  const obstacles = {};
  OBSTACLE_TYPES.forEach(ot => {
    obstacles[ot.id] = {checked: false, start: "", end: ""};
  });
  return {
    id: Date.now() + idx,
    isLegal: false,
    name: "",
    gender: "男",
    dob: "",
    idNumber: "",
    householdAddr: "",
    currentAddr: "",
    sameAsHousehold: false,
    lawyer: "無",
    companyName: "",
    taxId: "",
    repName: "",
    companyAddr: "",
    arrestTime: (() => { const d = new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10) + 'T00:00:00'; })(),
    arrestPlace: "",
    obstacles,
    activeTab: "basic"
  };
}

// BirthDateInput — three plain text boxes: [yr]年[mo]月[dy]日
function BirthDateInput({value, onChange}) {
  const parse = (str) => {
    const m = (str||"").match(/^(\d{1,3})年(\d{1,2})月(\d{1,2})日$/);
    return m ? {yr:m[1], mo:m[2], dy:m[3]} : {yr:"", mo:"", dy:""};
  };
  const [parts, setParts] = React.useState(()=>parse(value));
  React.useEffect(()=>setParts(parse(value)), [value]);

  const update = (field, val) => {
    const next = {...parts, [field]: val};
    setParts(next);
    if (next.yr && next.mo && next.dy) {
      onChange(`${next.yr}年${next.mo}月${next.dy}日`);
    }
  };

  return (
    <div className="flex items-center gap-1 text-sm">
      <input type="text" inputMode="numeric"
        className="border rounded px-1 w-14 text-center"
        placeholder="年" maxLength={3}
        value={parts.yr} onChange={e=>update("yr",e.target.value)} />
      <span>年</span>
      <input type="text" inputMode="numeric"
        className="border rounded px-1 w-10 text-center"
        placeholder="月" maxLength={2}
        value={parts.mo} onChange={e=>update("mo",e.target.value)} />
      <span>月</span>
      <input type="text" inputMode="numeric"
        className="border rounded px-1 w-10 text-center"
        placeholder="日" maxLength={2}
        value={parts.dy} onChange={e=>update("dy",e.target.value)} />
      <span>日</span>
    </div>
  );
}

// MinguoDateTimeInput component
// Uses local useState so each dropdown selection is immediately visible,
// and propagates up only when year+month+day are all filled.
function MinguoDateTimeInput({value, onChange}) {
  const toparts = (iso) => {
    if (!iso) return {yr:"",mo:"",dy:"",hr:"0",mn:"0"};
    const d = new Date(iso);
    if (isNaN(d.getTime())) return {yr:"",mo:"",dy:"",hr:"0",mn:"0"};
    return {
      yr: String(d.getFullYear()-1911),
      mo: String(d.getMonth()+1),
      dy: String(d.getDate()),
      hr: String(d.getHours()),
      mn: String(d.getMinutes())
    };
  };

  const [parts, setParts] = React.useState(() => toparts(value));

  // Sync when external value changes (e.g. auto-fill for obstacle type 3)
  React.useEffect(() => {
    setParts(toparts(value));
  }, [value]);

  const update = (field, val) => {
    const next = {...parts, [field]: val};
    setParts(next); // always update local display immediately
    if (next.yr && next.mo && next.dy) {
      // Only propagate when date is complete
      onChange(parseMinguoDateTime(next.yr, next.mo, next.dy, next.hr||"0", next.mn||"0"));
    }
    // Don't call onChange("") — keep parent's last valid value if date incomplete
  };

  const months = Array.from({length:12},(_,i)=>i+1);
  const days = Array.from({length:31},(_,i)=>i+1);
  const hours = Array.from({length:24},(_,i)=>i);
  const minutes = Array.from({length:60},(_,i)=>i);

  return (
    <div className="flex flex-wrap items-center gap-1 text-sm">
      <span>民國</span>
      <input
        type="number"
        className="border rounded px-1 w-16 text-center"
        placeholder="年"
        value={parts.yr}
        min="1"
        max="200"
        onChange={e=>update("yr",e.target.value)}
      />
      <span>年</span>
      <select className="border rounded px-1" value={parts.mo} onChange={e=>update("mo",e.target.value)}>
        <option value="">月</option>
        {months.map(m=><option key={m} value={String(m)}>{m}</option>)}
      </select>
      <span>月</span>
      <select className="border rounded px-1" value={parts.dy} onChange={e=>update("dy",e.target.value)}>
        <option value="">日</option>
        {days.map(d=><option key={d} value={String(d)}>{d}</option>)}
      </select>
      <span>日</span>
      <select className="border rounded px-1" value={parts.hr} onChange={e=>update("hr",e.target.value)}>
        {hours.map(h=><option key={h} value={String(h)}>{String(h).padStart(2,'0')}</option>)}
      </select>
      <span>時</span>
      <select className="border rounded px-1" value={parts.mn} onChange={e=>update("mn",e.target.value)}>
        {minutes.map(m=><option key={m} value={String(m)}>{String(m).padStart(2,'0')}</option>)}
      </select>
      <span>分</span>
    </div>
  );
}

// Obstacle row component
function ObstacleRow({obstacleType, value, onChange, sunTimes}) {
  const {checked, start, end} = value;

  const handleAutoFill = () => {
    if (sunTimes && sunTimes.sunset && sunTimes.sunrise) {
      onChange({...value, start: sunTimes.sunset, end: sunTimes.sunrise});
    }
  };

  return (
    <div className="border rounded p-2 mb-2 bg-white">
      <div className="flex items-start gap-2">
        <input
          type="checkbox"
          className="mt-1"
          checked={checked}
          onChange={e=>{
            const isChecked = e.target.checked;
            if (!isChecked) {
              // Unchecking: clear everything
              onChange({...value, checked: false, start: "", end: ""});
            } else if (obstacleType.id !== 3) {
              // Checking non-sunrise type: pre-fill today at 00:00
              const todayISO = new Date().toISOString().slice(0,10) + 'T00:00:00';
              onChange({...value, checked: true, start: todayISO, end: todayISO});
            } else {
              // Checking type 3 (sunrise/sunset): just mark checked, user fills via auto-fill button
              onChange({...value, checked: true});
            }
          }}
        />
        <span className="text-sm flex-1">{obstacleType.id}. {obstacleType.name}</span>
      </div>
      {checked && (
        <div className="mt-2 pl-6 space-y-2">
          <div className="flex items-center gap-2 text-sm">
            <span className="text-gray-600 w-10">開始：</span>
            <MinguoDateTimeInput value={start} onChange={v=>onChange({...value, start:v})} />
          </div>
          <div className="flex items-center gap-2 text-sm">
            <span className="text-gray-600 w-10">結束：</span>
            <MinguoDateTimeInput value={end} onChange={v=>onChange({...value, end:v})} />
          </div>
          {obstacleType.autoFillSunrise && sunTimes && (
            <button
              className="text-xs bg-yellow-100 border border-yellow-400 text-yellow-800 px-2 py-1 rounded hover:bg-yellow-200"
              onClick={handleAutoFill}
            >
              自動填入日出日沒
            </button>
          )}
          {obstacleType.autoFillSunrise && !sunTimes && (
            <span className="text-xs text-red-400">無法取得日出日沒資料</span>
          )}
          {start && end && new Date(end) > new Date(start) && (
            <div className="text-xs text-green-700 bg-green-50 px-2 py-1 rounded">
              合計：{minutesToHM((new Date(end)-new Date(start))/60000)}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// Suspect card component
function SuspectCard({suspect, index, onChange, onRemove, sunTimes}) {
  const [expanded, setExpanded] = React.useState(true);
  const [ocrLoading, setOcrLoading] = React.useState(false);
  const [ocrError, setOcrError] = React.useState("");
  const fileInputRef = React.useRef(null);

  const displayName = suspect.isLegal
    ? (suspect.companyName || `新法人 ${index+1}`)
    : (suspect.name || `新犯嫌 ${index+1}`);

  const updateField = (field, val) => {
    onChange({...suspect, [field]: val});
  };

  const handleOcrUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    setOcrError("");
    setOcrLoading(true);
    try {
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const dataUrl = ev.target.result;
          const base64 = dataUrl.split(",")[1];
          const mediaType = file.type || "image/jpeg";

          const res = await fetch("/api/ocr", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({imageBase64: base64, mediaType})
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "辨識失敗");

          // Auto-fill fields; keep existing value if API returned empty
          const updates = {};
          if (data.name) updates.name = data.name;
          if (data.gender === "男" || data.gender === "女") updates.gender = data.gender;
          if (data.idNumber) updates.idNumber = data.idNumber;
          if (data.birthDate) updates.dob = data.birthDate;
          if (data.householdAddr) updates.householdAddr = data.householdAddr;
          if (data.currentAddr) updates.currentAddr = data.currentAddr;
          onChange({...suspect, ...updates});
          setOcrLoading(false);
        } catch(err) {
          setOcrError(err.message);
          setOcrLoading(false);
        }
      };
      reader.readAsDataURL(file);
    } catch(err) {
      setOcrError(err.message);
      setOcrLoading(false);
    }
  };

  const updateObstacle = (id, val) => {
    onChange({...suspect, obstacles: {...suspect.obstacles, [id]: val}});
  };

  const handleSameAsHousehold = (checked) => {
    if (checked) {
      onChange({...suspect, sameAsHousehold: true, currentAddr: suspect.householdAddr});
    } else {
      onChange({...suspect, sameAsHousehold: false});
    }
  };

  const totalObs = calcObstacleMinutes(suspect.obstacles);

  return (
    <div className="border rounded-lg shadow-sm bg-white mb-4">
      <div
        className="flex items-center justify-between p-3 cursor-pointer bg-gray-50 rounded-t-lg"
        onClick={()=>setExpanded(!expanded)}
      >
        <div className="flex items-center gap-3">
          <span className="font-bold text-blue-700">犯嫌 {index+1}：{displayName}</span>
          {!expanded && suspect.arrestTime && (
            <span className="text-sm text-gray-500">
              拘提：{isoToMinguo(suspect.arrestTime)}
            </span>
          )}
        </div>
        <div className="flex items-center gap-2">
          <button
            className="text-xs bg-red-100 border border-red-300 text-red-700 px-2 py-1 rounded hover:bg-red-200"
            onClick={e=>{e.stopPropagation(); if(confirm(`確定要移除「${displayName}」？`)) onRemove();}}
          >
            移除
          </button>
          <span className="text-gray-400">{expanded ? "▲" : "▼"}</span>
        </div>
      </div>

      {expanded && (
        <div className="p-4">
          <div className="flex border-b mb-4">
            <button
              className={`px-4 py-2 text-sm font-medium ${suspect.activeTab==="basic" ? "tab-active" : "text-gray-500 hover:text-gray-700"}`}
              onClick={()=>updateField("activeTab","basic")}
            >基本資料</button>
            {!suspect.isLegal && (
              <button
                className={`px-4 py-2 text-sm font-medium ${suspect.activeTab==="obstacle" ? "tab-active" : "text-gray-500 hover:text-gray-700"}`}
                onClick={()=>updateField("activeTab","obstacle")}
              >法定障礙事由 {totalObs > 0 ? `(${minutesToHM(totalObs)})` : ""}</button>
            )}
          </div>

          {suspect.activeTab === "basic" && (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {/* 自然人 / 法人 toggle */}
              <div className="md:col-span-2 flex items-center gap-6 pb-2 border-b">
                <span className="text-sm font-medium text-gray-700">移送對象類型：</span>
                {[{val:false,label:"自然人"},{val:true,label:"法人"}].map(opt=>(
                  <label key={String(opt.val)} className="flex items-center gap-1 cursor-pointer">
                    <input type="radio" name={`suspectType-${suspect.id}`}
                      checked={suspect.isLegal === opt.val}
                      onChange={()=>updateField("isLegal", opt.val)} />
                    <span className="text-sm">{opt.label}</span>
                  </label>
                ))}
              </div>

              {!suspect.isLegal ? (
                <>
                  {/* OCR import button */}
                  <div className="md:col-span-2 flex items-center gap-3">
                    <input
                      type="file"
                      accept="image/*"
                      ref={fileInputRef}
                      className="hidden"
                      onChange={handleOcrUpload}
                    />
                    <button
                      className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-3 py-2 rounded shadow disabled:opacity-50"
                      onClick={()=>fileInputRef.current.click()}
                      disabled={ocrLoading}
                    >
                      {ocrLoading ? "辨識中…" : "📷 智慧照片匯入"}
                    </button>
                    {ocrLoading && <span className="text-sm text-indigo-600 animate-pulse">AI 辨識中，請稍候…</span>}
                    {ocrError && <span className="text-sm text-red-600">⚠ {ocrError}</span>}
                    {!ocrLoading && !ocrError && <span className="text-xs text-gray-400">上傳智慧照片截圖，自動填入基本資料</span>}
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                    <input type="text" className="w-full border rounded px-2 py-1"
                      value={suspect.name} onChange={e=>updateField("name",e.target.value)} />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">性別</label>
                    <div className="flex gap-4 pt-1">
                      {["男","女"].map(g=>(
                        <label key={g} className="flex items-center gap-1 cursor-pointer">
                          <input type="radio" name={`gender-${suspect.id}`}
                            checked={suspect.gender===g}
                            onChange={()=>updateField("gender",g)} />
                          <span>{g}</span>
                        </label>
                      ))}
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">出生年月日</label>
                    <BirthDateInput value={suspect.dob} onChange={v=>updateField("dob",v)} />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">身分證號</label>
                    <input type="text" className="w-full border rounded px-2 py-1"
                      value={suspect.idNumber} onChange={e=>updateField("idNumber",e.target.value)} />
                  </div>
                  <div className="md:col-span-2">
                    <label className="block text-sm font-medium text-gray-700 mb-1">戶籍地址</label>
                    <input type="text" className="w-full border rounded px-2 py-1"
                      value={suspect.householdAddr}
                      onChange={e=>{
                        const v = e.target.value;
                        if (suspect.sameAsHousehold) {
                          onChange({...suspect, householdAddr:v, currentAddr:v});
                        } else {
                          updateField("householdAddr",v);
                        }
                      }} />
                  </div>
                  <div className="md:col-span-2">
                    <div className="flex items-center justify-between mb-1">
                      <label className="block text-sm font-medium text-gray-700">現住地址</label>
                      <label className="flex items-center gap-1 text-sm cursor-pointer">
                        <input type="checkbox" checked={suspect.sameAsHousehold}
                          onChange={e=>handleSameAsHousehold(e.target.checked)} />
                        <span>同戶籍</span>
                      </label>
                    </div>
                    <input type="text" className="w-full border rounded px-2 py-1"
                      value={suspect.currentAddr}
                      disabled={suspect.sameAsHousehold}
                      onChange={e=>updateField("currentAddr",e.target.value)} />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">選任辯護人</label>
                    <input type="text" className="w-full border rounded px-2 py-1"
                      value={suspect.lawyer} onChange={e=>updateField("lawyer",e.target.value)} />
                  </div>
                  <div className="md:col-span-2">
                    <label className="block text-sm font-medium text-gray-700 mb-1">拘提時間</label>
                    <MinguoDateTimeInput value={suspect.arrestTime} onChange={v=>updateField("arrestTime",v)} />
                  </div>
                  <div className="md:col-span-2">
                    <label className="block text-sm font-medium text-gray-700 mb-1">拘提地點</label>
                    <input type="text" className="w-full border rounded px-2 py-1"
                      value={suspect.arrestPlace} onChange={e=>updateField("arrestPlace",e.target.value)} />
                  </div>
                </>
              ) : (
                <>
                  <div className="md:col-span-2">
                    <label className="block text-sm font-medium text-gray-700 mb-1">公司名稱</label>
                    <input type="text" className="w-full border rounded px-2 py-1"
                      value={suspect.companyName} onChange={e=>updateField("companyName",e.target.value)} />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">統一編號</label>
                    <input type="text" className="w-full border rounded px-2 py-1"
                      value={suspect.taxId} onChange={e=>updateField("taxId",e.target.value)} />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">代表人姓名</label>
                    <input type="text" className="w-full border rounded px-2 py-1"
                      value={suspect.repName} onChange={e=>updateField("repName",e.target.value)} />
                  </div>
                  <div className="md:col-span-2">
                    <label className="block text-sm font-medium text-gray-700 mb-1">公司所在地</label>
                    <input type="text" className="w-full border rounded px-2 py-1"
                      value={suspect.companyAddr} onChange={e=>updateField("companyAddr",e.target.value)} />
                  </div>
                </>
              )}
            </div>
          )}

          {suspect.activeTab === "obstacle" && (
            <div>
              {OBSTACLE_TYPES.map(ot=>(
                <ObstacleRow
                  key={ot.id}
                  obstacleType={ot}
                  value={suspect.obstacles[ot.id]}
                  onChange={v=>updateObstacle(ot.id, v)}
                  sunTimes={sunTimes}
                />
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// Deadline summary table
function DeadlineSummary({suspects, isWanted}) {
  const naturalPersons = suspects.filter(s => !s.isLegal);
  if (naturalPersons.length === 0) return null;
  suspects = naturalPersons;
  return (
    <div className="bg-white rounded-lg shadow-sm p-4 mb-4">
      <h2 className="text-lg font-bold text-gray-800 mb-3 border-b pb-2">
        解送期限摘要（法定期限：{isWanted?"24小時（通緝犯）":"16小時"}）
      </h2>
      <div className="overflow-x-auto">
        <table className="w-full text-sm border-collapse">
          <thead>
            <tr className="bg-gray-100">
              <th className="border px-3 py-2 text-left">姓名</th>
              <th className="border px-3 py-2 text-left">拘提時間</th>
              <th className="border px-3 py-2 text-left">障礙合計</th>
              <th className="border px-3 py-2 text-left">解送期限</th>
            </tr>
          </thead>
          <tbody>
            {suspects.map((s,i)=>{
              const obsMin = calcObstacleMinutes(s.obstacles);
              const deadline = calcDeadline(s.arrestTime, isWanted, obsMin);
              const now = new Date();
              const isUrgent = deadline && (new Date(deadline) - now) < 3600000;
              const isOverdue = deadline && new Date(deadline) < now;
              return (
                <tr key={s.id} className={isOverdue ? "bg-red-50" : isUrgent ? "bg-yellow-50" : ""}>
                  <td className="border px-3 py-2">{s.isLegal ? (s.companyName || `新法人 ${i+1}`) : (s.name || `新犯嫌 ${i+1}`)}</td>
                  <td className="border px-3 py-2">{s.arrestTime ? isoToMinguo(s.arrestTime) : "—"}</td>
                  <td className="border px-3 py-2">{obsMin > 0 ? minutesToHM(obsMin) : "無"}</td>
                  <td className={`border px-3 py-2 font-medium ${isOverdue ? "text-red-700" : isUrgent ? "text-yellow-700" : "text-green-700"}`}>
                    {deadline ? isoToMinguo(deadline) : "—"}
                    {isOverdue && <span className="ml-1 text-xs">⚠ 已逾期</span>}
                    {isUrgent && !isOverdue && <span className="ml-1 text-xs">⚠ 即將到期</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// DOCX generation
async function generateReport(caseInfo, suspects, caseFacts, lawArticles, evidence, detention) {
  // docx@7 UMD build loaded via <script> tag, available as window.docx
  const {Document, Packer, Table, TableRow, TableCell, Paragraph, TextRun, WidthType, AlignmentType, VerticalAlign, BorderStyle, ShadingType} = window.docx;

  const boldKai = (text, size=28) => new TextRun({text, bold:true, font:"標楷體", size});
  const kai = (text, size=28) => new TextRun({text, font:"標楷體", size});
  const newline = () => new TextRun({text:"", break:1});

  const cellStyle = {
    borders: {
      top: {style: BorderStyle.SINGLE, size:1},
      bottom: {style: BorderStyle.SINGLE, size:1},
      left: {style: BorderStyle.SINGLE, size:1},
      right: {style: BorderStyle.SINGLE, size:1},
    }
  };

  const makeCell = (paragraphs, opts={}) => new TableCell({
    ...cellStyle,
    ...opts,
    children: paragraphs
  });

  const makePara = (runs, opts={}) => new Paragraph({
    ...opts,
    children: Array.isArray(runs) ? runs : [runs]
  });

  // Title row 1: [單位]解送人犯報告書（跨全行）
  const unitName = caseInfo.unit || caseInfo.policeAgency;
  const titleText = `${unitName}解送人犯報告書`;

  const titleRow = new TableRow({children:[
    makeCell([
      makePara([boldKai(titleText, 52)], {alignment: AlignmentType.CENTER})
    ], {
      columnSpan: 3,
      verticalAlign: VerticalAlign.CENTER,
      shading: {type: ShadingType.CLEAR, color: "auto", fill: "E8EDF4"}
    })
  ]});

  // Title row 2: 發文日期 與 發文字號 同一格同一行
  const issueDateRow = new TableRow({children:[
    makeCell([
      makePara([
        kai(`發文日期：${caseInfo.issueDate||""}`),
        new TextRun({text: "　　", font:"標楷體", size:28}),
        kai(`發文字號：${caseInfo.issueNumber||""}`)
      ])
    ], {columnSpan: 3, verticalAlign: VerticalAlign.CENTER})
  ]});

  const rows = [titleRow, issueDateRow];

  // Per suspect rows
  suspects.forEach(s => {
    let subjectLabel, fieldNames, fieldValues;
    if (s.isLegal) {
      subjectLabel = "被移送法人";
      fieldNames = ["公司名稱","統一編號","代表人姓名","公司所在地"];
      fieldValues = [
        s.companyName||"",
        s.taxId||"",
        s.repName||"",
        s.companyAddr||"",
      ];
    } else {
      subjectLabel = "犯罪嫌疑人（被告）";
      fieldNames = ["姓名","性別","出生年月日","身分證號","戶籍地址","現住地址","選任辯護人","拘提時間","拘提地點"];
      fieldValues = [
        s.name||"",
        s.gender||"",
        s.dob||"",
        s.idNumber||"",
        s.householdAddr||"",
        s.currentAddr||"",
        s.lawyer||"無",
        s.arrestTime ? isoToMinguo(s.arrestTime) : "",
        s.arrestPlace||"",
      ];
    }

    const labelCell = makeCell([
      makePara([boldKai(subjectLabel)])
    ], {verticalAlign: VerticalAlign.CENTER});

    const fieldsCell = makeCell(fieldNames.map(n => makePara([kai(n)])));
    const valuesCell = makeCell(fieldValues.map(v => makePara([kai(v)])));

    rows.push(new TableRow({children:[labelCell, fieldsCell, valuesCell]}));
  });

  // Case facts row
  const caseFactsRow = new TableRow({children:[
    makeCell([makePara([boldKai("犯罪嫌疑事實及所犯法條")])], {verticalAlign: VerticalAlign.CENTER}),
    makeCell([
      makePara([kai(`一、嫌疑事實：`)]),
      makePara([kai(caseFacts||"")]),
      makePara([kai(`二、所犯法條：${lawArticles||""}`)]),
    ], {columnSpan: 2})
  ]});
  rows.push(caseFactsRow);

  // Evidence row
  const evidenceParas = EVIDENCE_ITEMS.map(item => {
    const v = evidence[item.id];
    const checked = !!v?.checked;
    const mark = checked ? "■" : "□";
    let text = `${mark}${item.label}`;
    if (item.hasText && checked && v?.text) text += v.text;
    return makePara([checked ? boldKai(text) : kai(text)]);
  });

  rows.push(new TableRow({children:[
    makeCell([makePara([boldKai("所 附 證 據 資 料")])], {verticalAlign: VerticalAlign.CENTER}),
    makeCell(evidenceParas, {columnSpan: 2})
  ]}));

  // Detention row
  const detentionParas = DETENTION_ITEMS.map(item => {
    const v = detention[item.id];
    const checked = !!v?.checked;
    const mark = checked ? "■" : "□";
    let text = `${mark}${item.label}`;
    if (item.hasText && checked && v?.text) text += v.text;
    return makePara([checked ? boldKai(text) : kai(text)]);
  });

  rows.push(new TableRow({children:[
    makeCell([makePara([boldKai("有無羈押必要之參考事項")])], {verticalAlign: VerticalAlign.CENTER}),
    makeCell(detentionParas, {columnSpan: 2})
  ]}));

  // Obstacles row (法人 excluded from obstacle calculations)
  const naturalSuspects = suspects.filter(s => !s.isLegal);
  const obstacleParas = [];
  OBSTACLE_TYPES.forEach(ot => {
    const anyChecked = naturalSuspects.some(s => s.obstacles[ot.id]?.checked);
    const mark = anyChecked ? "■" : "□";
    obstacleParas.push(makePara([anyChecked ? boldKai(`${mark}${ot.name}`) : kai(`${mark}${ot.name}.`)]));
    naturalSuspects.forEach(s => {
      const obs = s.obstacles[ot.id];
      if (obs?.checked && obs.start && obs.end) {
        const txt = `　${s.name||"犯嫌"}（${isoToMinguo(obs.start)}至${isoToMinguo(obs.end)}）`;
        obstacleParas.push(makePara([kai(txt)]));
      }
    });
  });

  obstacleParas.push(makePara([boldKai("因上述法定障礙事由，其經過之時間合計如下：")]));
  naturalSuspects.forEach(s => {
    const mins = calcObstacleMinutes(s.obstacles);
    if (mins > 0) {
      obstacleParas.push(makePara([kai(`　${s.name||"犯嫌"}：${minutesToHM(mins)}`)]));
    }
  });

  rows.push(new TableRow({children:[
    makeCell([makePara([boldKai("法定障礙事由")])], {verticalAlign: VerticalAlign.CENTER}),
    makeCell(obstacleParas, {columnSpan: 2})
  ]}));

  // 此致
  rows.push(new TableRow({children:[
    makeCell([
      makePara([kai("此　致")]),
      makePara([boldKai(caseInfo.targetProsecutor||"　　地方檢察署")])
    ], {columnSpan: 3})
  ]}));

  // 人犯解交時間
  rows.push(new TableRow({children:[
    makeCell([
      makePara([kai("人犯解交地檢署時間：　　年　　月　　日　　時　　分")])
    ], {columnSpan: 3})
  ]}));

  // 解交人/接收人（平均分配寬度）
  rows.push(new TableRow({children:[
    new TableCell({
      ...cellStyle,
      width: {size: 50, type: WidthType.PERCENTAGE},
      columnSpan: 1,
      children: [makePara([kai("解交人：")])],
      verticalAlign: VerticalAlign.CENTER
    }),
    new TableCell({
      ...cellStyle,
      width: {size: 50, type: WidthType.PERCENTAGE},
      columnSpan: 2,
      children: [makePara([kai("接收人：")])],
      verticalAlign: VerticalAlign.CENTER
    })
  ]}));

  // Column widths in twips (total content width ~9746 twips on A4 with 1080 margins)
  // Col1: category label 1500 | Col2: field names 2000 | Col3: values 6246
  const columnWidths = [1500, 2000, 6246];

  const table = new Table({
    width: {size: 100, type: WidthType.PERCENTAGE},
    columnWidths,
    rows
  });

  const doc = new Document({
    sections: [{
      properties: {
        page: {
          margin: {top:1440, bottom:1440, left:1080, right:1080}
        }
      },
      children: [table]
    }]
  });

  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `解送人犯報告書_${caseInfo.issueDate||"未填日期"}.docx`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

// Main App
function App() {
  const agencyKeys = Object.keys(AGENCIES);

  // Case info
  const [policeAgency, setPoliceAgency] = React.useState(agencyKeys[0]);
  const [subAgency, setSubAgency] = React.useState("");
  const [unit, setUnit] = React.useState("");
  const [agencyAddr, setAgencyAddr] = React.useState("");
  const [isWanted, setIsWanted] = React.useState(false);
  const [issueDate, setIssueDate] = React.useState(() => {
    const t = new Date();
    return `${t.getFullYear()-1911}年${t.getMonth()+1}月${t.getDate()}日`;
  });
  const [issueNumber, setIssueNumber] = React.useState("");
  const [targetProsecutor, setTargetProsecutor] = React.useState("臺灣基隆地方檢察署");

  // Suspects
  const [suspects, setSuspects] = React.useState([]);

  // Case facts
  const [caseFacts, setCaseFacts] = React.useState("");
  const [lawArticles, setLawArticles] = React.useState("");

  // Evidence & detention (default all evidence checked except e7 "其他")
  const initEvidence = () => {
    const v = {};
    EVIDENCE_ITEMS.forEach(item => { v[item.id] = {checked: true, text:""}; });
    return v;
  };
  const initDetention = () => {
    const v = {};
    DETENTION_ITEMS.forEach(item => { v[item.id] = {checked: false, text:""}; });
    return v;
  };

  const [evidence, setEvidence] = React.useState(initEvidence);
  const [detention, setDetention] = React.useState(initDetention);

  // Sun times
  const [sunTimes, setSunTimes] = React.useState(null);
  const [sunLoading, setSunLoading] = React.useState(false);
  const [sunError, setSunError] = React.useState(false);

  // Get county for sun API
  const county = COUNTY_MAP[policeAgency];

  // Fetch sun times when agency or first suspect arrest date changes
  // Memoize so partial typing (e.g. year field mid-input) doesn't fire the API
  const firstArrestDate = React.useMemo(() =>
    suspects.length > 0 && suspects[0].arrestTime
      ? suspects[0].arrestTime.split("T")[0]
      : new Date().toISOString().split("T")[0]
  , [suspects[0]?.arrestTime?.split("T")[0]]);

  React.useEffect(() => {
    if (!county) {
      setSunTimes(null);
      setSunError(true);
      return;
    }
    setSunLoading(true);
    setSunError(false);

    const arrestDate = new Date(firstArrestDate);
    const nextDate = new Date(arrestDate);
    nextDate.setDate(nextDate.getDate()+1);
    const nextDateStr = nextDate.toISOString().split("T")[0];

    const API_KEY = "CWA-D28BB60D-EFE5-4568-A308-63F3820BD9A1";
    const url1 = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/A-B0062-001?Authorization=${API_KEY}&format=JSON&locationName=${encodeURIComponent(county)}&Date=${firstArrestDate}`;
    const url2 = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/A-B0062-001?Authorization=${API_KEY}&format=JSON&locationName=${encodeURIComponent(county)}&Date=${nextDateStr}`;

    Promise.all([fetch(url1).then(r=>r.json()), fetch(url2).then(r=>r.json())])
      .then(([j1, j2]) => {
        try {
          const sunsetRaw = j1.records.locations.location[0].time[0].SunSetTime;
          const sunriseRaw = j2.records.locations.location[0].time[0].SunRiseTime;
          // Build ISO strings
          const sunset = `${firstArrestDate}T${sunsetRaw}:00`;
          const sunrise = `${nextDateStr}T${sunriseRaw}:00`;
          setSunTimes({sunset, sunrise});
          setSunLoading(false);
        } catch(e) {
          setSunError(true);
          setSunLoading(false);
        }
      })
      .catch(()=>{
        setSunError(true);
        setSunLoading(false);
      });
  }, [county, firstArrestDate]);

  // Update address when sub-agency changes
  React.useEffect(() => {
    if (policeAgency && subAgency && AGENCIES[policeAgency]?.subAgencies?.[subAgency]) {
      setAgencyAddr(AGENCIES[policeAgency].subAgencies[subAgency].addr);
    } else {
      setAgencyAddr("");
    }
  }, [policeAgency, subAgency]);

  // Reset subagency when agency changes
  React.useEffect(() => {
    setSubAgency("");
  }, [policeAgency]);

  const addSuspect = () => {
    setSuspects(prev => [...prev, newSuspect(prev.length)]);
  };

  const updateSuspect = (idx, val) => {
    setSuspects(prev => prev.map((s,i)=>i===idx?val:s));
  };

  const removeSuspect = (idx) => {
    setSuspects(prev => prev.filter((_,i)=>i!==idx));
  };

  const subAgencies = policeAgency ? Object.keys(AGENCIES[policeAgency]?.subAgencies||{}) : [];

  const handleExport = () => {
    generateReport(
      {policeAgency, subAgency, unit, agencyAddr, isWanted, issueDate, issueNumber, targetProsecutor},
      suspects, caseFacts, lawArticles, evidence, detention
    ).catch(e => alert("匯出失敗：" + e.message));
  };

  return (
    <div className="max-w-5xl mx-auto px-4 pb-12">
      {/* Header */}
      <div className="bg-blue-800 text-white rounded-b-lg shadow-lg px-6 py-4 mb-6 sticky top-0 z-10">
        <div className="flex items-center justify-between">
          <div>
            <h1 className="text-xl font-bold tracking-wide">解送人犯報告書系統</h1>
            <p className="text-blue-200 text-xs mt-0.5">基隆市警察局刑事警察大隊科技偵查隊　(v3.0)</p>
          </div>
          <div className="flex items-center gap-3">
            {sunLoading && (
              <div className="flex items-center gap-1 text-xs text-blue-200">
                <span className="animate-spin">⟳</span> 取得日出日沒...
              </div>
            )}
            {sunTimes && !sunLoading && (
              <div className="text-xs text-green-300">
                ☀ 日沒{sunTimes.sunset.slice(11,16)} / 日出{sunTimes.sunrise.slice(11,16)}
              </div>
            )}
            <button
              className={`px-4 py-2 rounded font-bold text-sm shadow ${suspects.length===0 ? "bg-gray-400 cursor-not-allowed" : "bg-green-500 hover:bg-green-400 text-white"}`}
              disabled={suspects.length===0}
              onClick={handleExport}
            >
              匯出報告書 (.docx)
            </button>
          </div>
        </div>
      </div>

      {/* Case Info */}
      <div className="bg-white rounded-lg shadow-sm p-4 mb-4">
        <h2 className="text-lg font-bold text-gray-800 mb-3 border-b pb-2">案件基本資訊</h2>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">警察機關</label>
            <select className="w-full border rounded px-2 py-1 text-sm"
              value={policeAgency} onChange={e=>setPoliceAgency(e.target.value)}>
              {agencyKeys.map(k=><option key={k} value={k}>{k}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">所屬分局</label>
            <select className="w-full border rounded px-2 py-1 text-sm"
              value={subAgency} onChange={e=>setSubAgency(e.target.value)}>
              <option value="">-- 請選擇 --</option>
              {subAgencies.map(k=><option key={k} value={k}>{k}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">單位（派出所/隊）</label>
            <input type="text" className="w-full border rounded px-2 py-1"
              value={unit} onChange={e=>setUnit(e.target.value)} />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">機關地址</label>
            <input type="text" className="w-full border rounded px-2 py-1"
              value={agencyAddr} onChange={e=>setAgencyAddr(e.target.value)}
              placeholder="選擇分局後自動填入" />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">是否為通緝犯</label>
            <div className="flex gap-4 pt-1">
              {[{label:"否",val:false},{label:"是",val:true}].map(o=>(
                <label key={String(o.val)} className="flex items-center gap-1 cursor-pointer">
                  <input type="radio" name="isWanted"
                    checked={isWanted===o.val}
                    onChange={()=>setIsWanted(o.val)} />
                  <span>{o.label}</span>
                  {o.val && <span className="text-xs text-orange-600">（24小時）</span>}
                  {!o.val && <span className="text-xs text-gray-500">（16小時）</span>}
                </label>
              ))}
            </div>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">發文日期</label>
            <BirthDateInput value={issueDate} onChange={setIssueDate} />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">發文字號</label>
            <input type="text" className="w-full border rounded px-2 py-1"
              value={issueNumber} onChange={e=>setIssueNumber(e.target.value)} />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">致送地方檢察署</label>
            <input type="text" className="w-full border rounded px-2 py-1"
              placeholder="例：臺灣基隆地方檢察署"
              value={targetProsecutor} onChange={e=>setTargetProsecutor(e.target.value)} />
          </div>
        </div>
      </div>

      {/* Suspects */}
      <div className="bg-white rounded-lg shadow-sm p-4 mb-4">
        <div className="flex items-center justify-between mb-3 border-b pb-2">
          <h2 className="text-lg font-bold text-gray-800">犯罪嫌疑人</h2>
          <button
            className="bg-blue-600 hover:bg-blue-500 text-white text-sm px-3 py-1 rounded shadow"
            onClick={addSuspect}
          >
            + 新增犯嫌
          </button>
        </div>
        {suspects.length === 0 && (
          <div className="text-center text-gray-400 py-8">尚未新增犯罪嫌疑人，請點擊「新增犯嫌」</div>
        )}
        {suspects.map((s,i)=>(
          <SuspectCard
            key={s.id}
            suspect={s}
            index={i}
            onChange={val=>updateSuspect(i,val)}
            onRemove={()=>removeSuspect(i)}
            sunTimes={sunError ? null : sunTimes}
          />
        ))}
      </div>

      {/* Case Facts */}
      <div className="bg-white rounded-lg shadow-sm p-4 mb-4">
        <h2 className="text-lg font-bold text-gray-800 mb-3 border-b pb-2">案情說明</h2>
        <div className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">犯罪嫌疑事實</label>
            <textarea
              className="w-full border rounded px-2 py-1 text-sm"
              rows={6}
              value={caseFacts}
              onChange={e=>{
                const el = e.target;
                el.style.height = "auto";
                el.style.height = el.scrollHeight + "px";
                setCaseFacts(e.target.value);
              }}
              placeholder="請輸入犯罪嫌疑事實..."
            />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">所犯法條</label>
            <input type="text" className="w-full border rounded px-2 py-1"
              placeholder="例：刑法第320條竊盜罪"
              value={lawArticles} onChange={e=>setLawArticles(e.target.value)} />
          </div>
        </div>
      </div>

      {/* Evidence */}
      <ChecklistSection
        title="所附證據資料"
        items={EVIDENCE_ITEMS}
        values={evidence}
        onChange={setEvidence}
      />

      {/* Detention */}
      <ChecklistSection
        title="有無羈押必要之參考事項"
        items={DETENTION_ITEMS}
        values={detention}
        onChange={setDetention}
      />

      {/* Deadline Summary */}
      <DeadlineSummary suspects={suspects} isWanted={isWanted} />

      {/* Footer */}
      <div className="text-center text-xs text-gray-400 mt-8 pb-4">
        解送人犯報告書系統 v3.0 | 基隆市警察局刑事警察大隊科技偵查隊 | 協作AI：Claude
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
<div id="root"></div>
</body>
